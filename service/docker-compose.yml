services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ../data/train_team_track.parquet:/app/app/data/train_team_track.parquet:ro
      - ../artifacts/h28_h27b_gru_winsorized_target.pt:/app/app/data/h28_h27b_gru_winsorized_target.pt:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
